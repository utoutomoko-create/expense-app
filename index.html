<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>経費レシート読取アプリ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.header-icon { width: 40px; height: 40px; border-radius: 10px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-icon svg { width: 20px; height: 20px; stroke: #1a73e8; fill: none; stroke-width: 2; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; color: #666; }
.sync-status { font-size: 11px; padding: 3px 8px; border-radius: 99px; margin-left: auto; flex-shrink: 0; }
.sync-ok { background: #d4edda; color: #1e7e34; }
.sync-err { background: #f8d7da; color: #721c24; }
.sync-loading { background: #fff3cd; color: #856404; }
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; }
.tab { padding: 8px 18px; font-size: 14px; border: none; background: none; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.panel { display: none; }
.panel.active { display: block; }
.preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; border: 1px solid #e0e0e0; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #1a1a1a; font-family: inherit; transition: background 0.15s; }
.btn:hover { background: #f5f5f5; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #1a1a1a; color: #fff; border-color: transparent; }
.btn-primary:hover { background: #333; }
.btn-danger { background: #fff; color: #dc3545; border-color: #dc3545; }
.btn-full { width: 100%; }
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.card-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.ai-badge { font-size: 10px; background: #e8f0fe; color: #1a73e8; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
.receipt-num { font-size: 10px; background: #f0f0f0; color: #666; padding: 2px 7px; border-radius: 99px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select { font-size: 14px; padding: 7px 9px; border: 1px solid #e0e0e0; border-radius: 7px; background: #fafafa; color: #1a1a1a; font-family: inherit; width: 100%; }
.field input:focus, .field select:focus { outline: none; border-color: #1a73e8; background: #fff; }
.field-full { grid-column: 1 / -1; }
.company-toggle { display: flex; gap: 6px; }
.company-btn { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid #e0e0e0; background: #fafafa; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; color: #666; transition: all 0.15s; }
.company-btn.active-karista { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }
.company-btn.active-glory { border-color: #e67700; background: #fff3e0; color: #e67700; }
.batch-company { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
.batch-company-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
.loading { display: none; text-align: center; padding: 1rem; font-size: 13px; color: #666; align-items: center; justify-content: center; gap: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.success-msg { display: none; text-align: center; padding: 0.75rem; font-size: 14px; color: #1e7e34; background: #d4edda; border-radius: 8px; margin-bottom: 1rem; }
.summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1rem; }
.stat { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px; }
.stat-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 600; color: #1a1a1a; }
.stat-value small { font-size: 12px; font-weight: 400; color: #666; }
.company-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.company-stat { border-radius: 10px; padding: 10px 12px; }
.company-stat.karista { background: #e8f0fe; border: 1px solid #c5d8f8; }
.company-stat.glory { background: #fff3e0; border: 1px solid #fcd9a0; }
.company-stat-label { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
.karista .company-stat-label { color: #1a73e8; }
.glory .company-stat-label { color: #e67700; }
.company-stat-value { font-size: 16px; font-weight: 600; color: #1a1a1a; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-size: 15px; font-weight: 600; }
.expense-list { display: flex; flex-direction: column; gap: 6px; }
.expense-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; }
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: #888; }
.expense-company { font-size: 10px; padding: 1px 6px; border-radius: 99px; font-weight: 600; flex-shrink: 0; }
.company-karista { background: #e8f0fe; color: #1a73e8; }
.company-glory { background: #fff3e0; color: #e67700; }
.expense-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.expense-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn { width: 28px; height: 28px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #ccc; }
.icon-btn:hover { background: #f0f0f0; color: #666; }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.empty-state { text-align: center; padding: 2.5rem; color: #aaa; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; }
#badge { display: none; font-size: 11px; background: #e8f0fe; color: #1a73e8; padding: 1px 6px; border-radius: 99px; margin-left: 4px; }
.multi-results { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1rem; }
.meeting-fields { display: none; padding: 10px; background: #f9f9f9; border-radius: 8px; border: 1px solid #e8e8e8; margin-bottom: 8px; }
.meeting-fields.show { display: block; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.25rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.modal-close { border: none; background: none; cursor: pointer; font-size: 20px; color: #999; line-height: 1; }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 14l2 2 4-4M7 3H5a2 2 0 00-2 2v16a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 3h6v4H9V3z"/></svg>
    </div>
    <div>
      <h1>経費レシート読取アプリ</h1>
      <p>レシート読取 / 音声入力 / 経費管理</p>
    </div>
    <span class="sync-status sync-loading" id="sync-status">接続中...</span>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('receipt')">レシート読取</button>
    <button class="tab" onclick="switchTab('list')">経費一覧<span id="badge"></span></button>
  </div>

  <div id="panel-receipt" class="panel active">
    <div class="batch-company">
      <div class="batch-company-label">この写真の会社を選択</div>
      <div class="company-toggle">
        <button class="company-btn active-karista" id="batch-karista" onclick="setBatchCompany('カリスタ')">カリスタ</button>
        <button class="company-btn" id="batch-glory" onclick="setBatchCompany('グローリー')">グローリー</button>
      </div>
      <input type="hidden" id="batch-company" value="カリスタ">
    </div>

    <input type="file" id="file-input" accept="image/*,application/pdf" onchange="handleFile(event)" style="display:none;">
    <input type="file" id="camera-input" accept="image/*" capture="environment" onchange="handleFile(event)" style="display:none;">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem;">
      <button class="btn btn-primary" onclick="document.getElementById('camera-input').click()" style="padding:14px;flex-direction:column;gap:6px;height:auto;">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        カメラで撮影
      </button>
      <button class="btn" onclick="document.getElementById('file-input').click()" style="padding:14px;flex-direction:column;gap:6px;height:auto;">
        <svg viewBox="0 0 24 24" style="width:22px;height:22px;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
        写真 / PDF
      </button>
    </div>

    <div id="preview-area" style="display:none;margin-bottom:1rem;">
      <img id="preview-img" class="preview-img" src="" alt="プレビュー" style="display:none;">
      <canvas id="preview-canvas" class="preview-img" style="display:none;max-height:200px;width:100%;object-fit:contain;"></canvas>
      <div id="preview-pdf-label" style="display:none;font-size:13px;color:#666;text-align:center;padding:8px;background:#f5f5f5;border-radius:8px;margin-top:6px;"></div>
    </div>

    <div class="loading" id="loading-receipt" style="display:none;">
      <div class="spinner"></div> AIが読み取り中...
    </div>
    <div class="success-msg" id="success-receipt">✓ 経費を登録しました</div>

    <div id="multi-results-area" style="display:none;">
      <div style="font-size:13px;color:#666;margin-bottom:10px;"><span id="receipt-count-msg"></span></div>
      <div class="multi-results" id="multi-results"></div>
      <button class="btn btn-primary btn-full" onclick="registerAll()" style="margin-top:4px;">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> すべて登録
      </button>
    </div>
  </div>

  <div id="panel-list" class="panel">
    <div class="summary-bar">
      <div class="stat"><div class="stat-label">件数</div><div class="stat-value" id="stat-count">0<small>件</small></div></div>
      <div class="stat"><div class="stat-label">合計</div><div class="stat-value" id="stat-total">¥0</div></div>
      <div class="stat"><div class="stat-label">今月</div><div class="stat-value" id="stat-month">¥0</div></div>
    </div>
    <div class="company-summary">
      <div class="company-stat karista"><div class="company-stat-label">カリスタ</div><div class="company-stat-value" id="stat-karista">¥0</div></div>
      <div class="company-stat glory"><div class="company-stat-label">グローリー</div><div class="company-stat-value" id="stat-glory">¥0</div></div>
    </div>
    <div class="section-header">
      <span class="section-title">経費履歴</span>
      <button class="btn" style="font-size:13px;padding:6px 12px;" onclick="exportCSV()">CSVで出力</button>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>
</div>

<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-title">経費を編集 <button class="modal-close" onclick="closeEditModal()">×</button></div>
    <div style="margin-bottom:12px;">
      <div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">会社</div>
      <div class="company-toggle">
        <button class="company-btn" id="e-karista-btn" onclick="setEditCompany('カリスタ')">カリスタ</button>
        <button class="company-btn" id="e-glory-btn" onclick="setEditCompany('グローリー')">グローリー</button>
      </div>
      <input type="hidden" id="e-company" value="カリスタ">
    </div>
    <div class="field-row">
      <div class="field"><label>日付</label><input type="date" id="e-date"></div>
      <div class="field"><label>金額</label><input type="text" id="e-amount"></div>
    </div>
    <div class="field-row">
      <div class="field field-full"><label>店名 / 支払先</label><input type="text" id="e-store"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>カテゴリ</label>
        <select id="e-cat" onchange="toggleEditMeeting()"></select>
      </div>
      <div class="field"><label>支払方法</label>
        <select id="e-payment"><option>現金</option><option>カード</option></select>
      </div>
    </div>
    <div class="meeting-fields" id="e-meeting">
      <div class="field-row">
        <div class="field"><label>人数</label><select id="e-people"></select></div>
        <div class="field"><label>相手の名前</label><input type="text" id="e-partner"></div>
      </div>
    </div>
    <div class="field-row">
      <div class="field field-full"><label>メモ</label><input type="text" id="e-memo"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary btn-full" onclick="saveEdit()">保存</button>
      <button class="btn btn-danger" onclick="deleteFromModal()">削除</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFrZe9evabVku5n4CjmwjsD5UsPWzmtKY",
  authDomain: "expense-4f6ed.firebaseapp.com",
  databaseURL: "https://expense-4f6ed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "expense-4f6ed",
  storageBucket: "expense-4f6ed.firebasestorage.app",
  messagingSenderId: "552130406535",
  appId: "1:552130406535:web:a12484d6362abc63557022"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const expensesRef = ref(db, 'expenses');
const API_URL = '/api/claude';
const GAS_PATH = '/api/gas';

// ★カテゴリを変更したい場合はこの行だけ編集してください（増減・名前変更すべてOK）
const CATEGORIES = ['会議費・交際費','交通費','宿泊費','調査費','トーナメント参加費','その他'];
// ★人数・相手の名前欄を表示するカテゴリ（接待など）。該当なしなら空文字 '' に。
const MEETING_CATEGORY = '会議費・交際費';
let expenses = [];
let editingId = null;
let pendingExpenses = [];
const supRecognitions = {};
const supRecording = {};

onValue(expensesRef, (snapshot) => {
  const data = snapshot.val();
  expenses = data ? Object.entries(data).map(([id, v]) => ({...v, firebaseId: id})).sort((a,b) => b.id - a.id) : [];
  updateList(); updateBadge();
  document.getElementById('sync-status').textContent = '同期済み';
  document.getElementById('sync-status').className = 'sync-status sync-ok';
}, () => {
  document.getElementById('sync-status').textContent = '接続エラー';
  document.getElementById('sync-status').className = 'sync-status sync-err';
});

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
};

window.setBatchCompany = function(company) {
  document.getElementById('batch-company').value = company;
  document.getElementById('batch-karista').className = 'company-btn' + (company === 'カリスタ' ? ' active-karista' : '');
  document.getElementById('batch-glory').className = 'company-btn' + (company === 'グローリー' ? ' active-glory' : '');
  pendingExpenses.forEach((_, i) => { if (document.getElementById(`company-${i}`)) setCompany(i, company); });
};

async function callClaude(messages) {
  const res = await fetch(API_URL, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({messages}) });
  return await res.json();
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale; canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = url;
  });
}

window.handleFile = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const isPdf = file.type === 'application/pdf';
  document.getElementById('preview-area').style.display = 'block';
  document.getElementById('multi-results-area').style.display = 'none';
  document.getElementById('success-receipt').style.display = 'none';
  document.getElementById('loading-receipt').style.display = 'flex';
  pendingExpenses = [];

  const today = new Date().toISOString().split('T')[0];
  const prompt = `あなたは経費精算の専門家です。添付画像内のレシート・領収書を全て検出し個別に解析してください。

重要：画像には最大10枚のレシートが含まれる可能性があります。見落とさず全て検出してください。重なっていても端が見えていれば検出を試みてください。

抽出ルール：
- date: 記載日付を読み取る。不明時のみ"${today}"。和暦は西暦に変換。
- amount: 税込合計を優先。"¥数字"形式（カンマなし）。
- store: 店名・会社名を正確に。
- category: 内容から最も適切なものを次の中から選択：${CATEGORIES.join(' / ')}。飲食店・カフェ・居酒屋は「会議費・交際費」、電車・バス・タクシーは「交通費」、ホテルは「宿泊費」が目安。判断できない場合は「その他」。
- memo: 補足あれば簡潔に、なければ空文字。

JSON配列のみで返答：
[{"date":"YYYY-MM-DD","amount":"¥数字","store":"店名","category":"${CATEGORIES.join('/')}","memo":"メモ"}]`;

  let messageContent;
  if (isPdf) {
    const arrayBuffer = await file.arrayBuffer();
    const uint8 = new Uint8Array(arrayBuffer);
    const pdfBase64 = btoa(uint8.reduce((d, b) => d + String.fromCharCode(b), ''));
    try {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdfDoc = await pdfjsLib.getDocument({ data: uint8 }).promise;
      const page = await pdfDoc.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.getElementById('preview-canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      canvas.style.display = 'block';
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('preview-pdf-label').style.display = 'block';
      document.getElementById('preview-pdf-label').textContent = `📄 ${file.name}（${pdfDoc.numPages}ページ）`;
    } catch(err) {
      document.getElementById('preview-pdf-label').style.display = 'block';
      document.getElementById('preview-pdf-label').textContent = `📄 ${file.name}`;
    }
    messageContent = [{ type:'document', source:{ type:'base64', media_type:'application/pdf', data:pdfBase64 } }, { type:'text', text:prompt }];
  } else {
    const base64 = await compressImage(file, 2000, 0.8);
    document.getElementById('preview-img').src = 'data:image/jpeg;base64,' + base64;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('preview-canvas').style.display = 'none';
    document.getElementById('preview-pdf-label').style.display = 'none';
    messageContent = [{ type:'image', source:{ type:'base64', media_type:'image/jpeg', data:base64 } }, { type:'text', text:prompt }];
  }

  const data = await callClaude([{ role:'user', content:messageContent }]);
  document.getElementById('loading-receipt').style.display = 'none';
  try {
    const text = data.content.map(b => b.text||'').join('');
    let parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    if (!Array.isArray(parsed)) parsed = [parsed];
    pendingExpenses = parsed;
    renderMultiResults(parsed);
  } catch(err) {
    pendingExpenses = [{ date:today, amount:'', store:'（手動入力）', category:'その他', memo:'' }];
    renderMultiResults(pendingExpenses);
  }
};

function peopleOptions(selected) {
  let opts = '';
  for (let n = 1; n <= 20; n++) opts += `<option ${selected==n?'selected':''}>${n}</option>`;
  return opts;
}
function catOptions(selected) {
  return CATEGORIES.map(c => `<option ${c===selected?'selected':''}>${c}</option>`).join('');
}

function renderMultiResults(receipts) {
  const batchCompany = document.getElementById('batch-company').value;
  const container = document.getElementById('multi-results');
  document.getElementById('receipt-count-msg').textContent = receipts.length > 1
    ? `📋 ${receipts.length}枚のレシートを検出しました` : '📋 レシートを読み取りました';
  container.innerHTML = receipts.map((r, i) => {
    const cat = CATEGORIES.includes(r.category) ? r.category : 'その他';
    const isMeeting = cat === MEETING_CATEGORY;
    return `
    <div class="card" style="margin-bottom:0;">
      <div class="card-title">
        ${receipts.length > 1 ? `<span class="receipt-num">レシート ${i+1}</span>` : ''}
        読取結果 <span class="ai-badge">Claude AI</span>
      </div>
      <div style="margin-bottom:10px;">
        <div style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">会社</div>
        <div class="company-toggle">
          <button class="company-btn ${batchCompany==='カリスタ'?'active-karista':''}" id="karista-btn-${i}" onclick="setCompany(${i},'カリスタ')">カリスタ</button>
          <button class="company-btn ${batchCompany==='グローリー'?'active-glory':''}" id="glory-btn-${i}" onclick="setCompany(${i},'グローリー')">グローリー</button>
        </div>
        <input type="hidden" id="company-${i}" value="${batchCompany}">
      </div>
      <div class="field-row">
        <div class="field"><label>日付</label><input type="date" id="r-date-${i}" value="${r.date||''}"></div>
        <div class="field"><label>金額</label><input type="text" id="r-amount-${i}" value="${r.amount||''}"></div>
      </div>
      <div class="field-row">
        <div class="field field-full"><label>店名 / 支払先</label><input type="text" id="r-store-${i}" value="${r.store||''}"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>カテゴリ</label>
          <select id="r-cat-${i}" onchange="toggleMeeting(${i})">${catOptions(cat)}</select>
        </div>
        <div class="field"><label>支払方法</label>
          <select id="r-payment-${i}"><option>現金</option><option>カード</option></select>
        </div>
      </div>
      <div class="meeting-fields ${isMeeting?'show':''}" id="meeting-${i}">
        <div class="field-row">
          <div class="field"><label>人数</label><select id="r-people-${i}">${peopleOptions(2)}</select></div>
          <div class="field">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
              <label style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px;">相手の名前</label>
              <button onclick="togglePartnerVoice(${i})" id="partner-mic-${i}" style="border:1px solid #e0e0e0;background:#fafafa;border-radius:6px;cursor:pointer;padding:3px 7px;display:flex;align-items:center;gap:3px;font-size:11px;color:#666;font-family:inherit;">
                <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>音声
              </button>
            </div>
            <input type="text" id="r-partner-${i}" placeholder="例：田中部長">
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field field-full"><label>メモ</label><input type="text" id="r-memo-${i}" value="${r.memo||''}" placeholder="任意"></div>
      </div>
      <div style="margin-top:8px;padding:10px;background:#f9f9f9;border-radius:8px;border:1px solid #e8e8e8;">
        <div style="font-size:12px;color:#666;margin-bottom:8px;">音声で修正</div>
        <div style="display:flex;align-items:center;gap:8px;">
          <button onclick="toggleSupVoice(${i})" class="btn" style="padding:6px 10px;font-size:12px;flex-shrink:0;" id="sup-mic-${i}">話す</button>
          <div id="sup-transcript-${i}" style="flex:1;font-size:12px;color:#aaa;min-height:28px;padding:5px 8px;background:#fff;border:1px solid #e0e0e0;border-radius:7px;">「金額を4000円に」など指示</div>
          <button onclick="applyVoice(${i})" class="btn btn-primary" style="display:none;padding:6px 10px;font-size:12px;flex-shrink:0;" id="sup-apply-${i}">修正</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('multi-results-area').style.display = 'block';
}

window.toggleMeeting = function(i) {
  const cat = document.getElementById(`r-cat-${i}`).value;
  document.getElementById(`meeting-${i}`).classList.toggle('show', cat === MEETING_CATEGORY);
};

window.setCompany = function(i, company) {
  const el = document.getElementById(`company-${i}`);
  if (!el) return;
  el.value = company;
  document.getElementById(`karista-btn-${i}`).className = 'company-btn' + (company === 'カリスタ' ? ' active-karista' : '');
  document.getElementById(`glory-btn-${i}`).className = 'company-btn' + (company === 'グローリー' ? ' active-glory' : '');
};

window.togglePartnerVoice = function(i) {
  const btn = document.getElementById(`partner-mic-${i}`);
  const input = document.getElementById(`r-partner-${i}`);
  btn.style.color = '#dc3545';
  startSpeechRecognition((text) => { input.value = text; }, () => { btn.style.color = '#666'; });
};

window.toggleSupVoice = function(i) {
  if (supRecording[i]) { supRecognitions[i] && supRecognitions[i].stop(); return; }
  const btn = document.getElementById(`sup-mic-${i}`);
  const transcript = document.getElementById(`sup-transcript-${i}`);
  btn.textContent = '停止'; btn.style.background = '#fff0f0'; btn.style.color = '#dc3545';
  transcript.style.color = '#1a1a1a'; supRecording[i] = true;
  supRecognitions[i] = startSpeechRecognition(
    (text) => { transcript.textContent = text; },
    () => {
      supRecording[i] = false; btn.textContent = '話す'; btn.style.background = ''; btn.style.color = '';
      if (transcript.textContent.length > 1) document.getElementById(`sup-apply-${i}`).style.display = 'block';
    }
  );
};

window.applyVoice = async function(i) {
  const voiceText = document.getElementById(`sup-transcript-${i}`).textContent;
  const today = new Date().toISOString().split('T')[0];
  const current = {
    date: document.getElementById(`r-date-${i}`).value,
    amount: document.getElementById(`r-amount-${i}`).value,
    store: document.getElementById(`r-store-${i}`).value,
    category: document.getElementById(`r-cat-${i}`).value,
    memo: document.getElementById(`r-memo-${i}`).value
  };
  document.getElementById(`sup-apply-${i}`).style.display = 'none';
  document.getElementById('loading-receipt').style.display = 'flex';
  const data = await callClaude([{ role:'user', content:`現在の入力に音声指示を適用しJSONのみ返答:\n現在: date=${current.date} amount=${current.amount} store=${current.store} category=${current.category} memo=${current.memo}\n指示:「${voiceText}」\n今日${today}。指示項目のみ変更。categoryは次から選択：${CATEGORIES.join('/')}。\n{"date":"YYYY-MM-DD","amount":"¥数字","store":"店名","category":"カテゴリ","memo":"メモ"}` }]);
  document.getElementById('loading-receipt').style.display = 'none';
  try {
    const parsed = JSON.parse(data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
    if (parsed.date) document.getElementById(`r-date-${i}`).value = parsed.date;
    if (parsed.amount) document.getElementById(`r-amount-${i}`).value = parsed.amount;
    if (parsed.store) document.getElementById(`r-store-${i}`).value = parsed.store;
    if (parsed.category && CATEGORIES.includes(parsed.category)) { document.getElementById(`r-cat-${i}`).value = parsed.category; toggleMeeting(i); }
    if (parsed.memo !== undefined) document.getElementById(`r-memo-${i}`).value = parsed.memo;
  } catch(e) {}
  document.getElementById(`sup-transcript-${i}`).textContent = '「金額を4000円に」など指示';
  document.getElementById(`sup-transcript-${i}`).style.color = '#aaa';
};

async function saveExpense(exp) {
  await Promise.all([
    push(expensesRef, exp),
    fetch(GAS_PATH, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(exp) }).catch(()=>{})
  ]);
}

window.registerAll = async function() {
  const count = pendingExpenses.length;
  for (let i = 0; i < count; i++) {
    const cat = document.getElementById(`r-cat-${i}`).value;
    const isMeeting = cat === MEETING_CATEGORY;
    const exp = {
      id: Date.now() + i,
      date: document.getElementById(`r-date-${i}`).value,
      amount: document.getElementById(`r-amount-${i}`).value,
      store: document.getElementById(`r-store-${i}`).value,
      cat: cat,
      payment: document.getElementById(`r-payment-${i}`).value,
      company: document.getElementById(`company-${i}`).value,
      people: isMeeting ? document.getElementById(`r-people-${i}`).value : '',
      partner: isMeeting ? document.getElementById(`r-partner-${i}`).value : '',
      memo: document.getElementById(`r-memo-${i}`).value
    };
    await saveExpense(exp);
  }
  document.getElementById('multi-results-area').style.display = 'none';
  document.getElementById('preview-area').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('camera-input').value = '';
  showSuccess('success-receipt');
  pendingExpenses = [];
};

function showSuccess(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

function startSpeechRecognition(onResult, onEnd) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('音声認識はChromeでのみ対応しています。'); return null;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = false; rec.interimResults = true;
  rec.onresult = (e) => onResult(Array.from(e.results).map(r => r[0].transcript).join(''));
  rec.onend = () => onEnd(); rec.onerror = () => onEnd();
  rec.start(); return rec;
}

function updateList() {
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  let total = 0, monthTotal = 0, karistaTotal = 0, gloryTotal = 0;
  expenses.forEach(e => {
    const n = parseInt((e.amount||'').replace(/[^0-9]/g,'')) || 0;
    total += n;
    if (e.date && e.date.startsWith(thisMonth)) monthTotal += n;
    if (e.company === 'グローリー') gloryTotal += n; else karistaTotal += n;
  });
  document.getElementById('stat-count').innerHTML = expenses.length + '<small>件</small>';
  document.getElementById('stat-total').textContent = '¥' + total.toLocaleString();
  document.getElementById('stat-month').textContent = '¥' + monthTotal.toLocaleString();
  document.getElementById('stat-karista').textContent = '¥' + karistaTotal.toLocaleString();
  document.getElementById('stat-glory').textContent = '¥' + gloryTotal.toLocaleString();
  const list = document.getElementById('expense-list');
  if (!expenses.length) { list.innerHTML = '<div class="empty-state">経費がまだ登録されていません</div>'; return; }
  list.innerHTML = expenses.map(e => {
    let metaExtra = '';
    if (e.cat === MEETING_CATEGORY && (e.people || e.partner)) {
      metaExtra = ` · ${e.people?e.people+'名':''}${e.partner?' '+e.partner:''}`;
    }
    return `
    <div class="expense-item">
      <div class="expense-info">
        <div class="expense-name">${e.store||'（店名なし）'}</div>
        <div class="expense-meta">${e.date||''} · ${e.cat||''}${e.payment?' · '+e.payment:''}${metaExtra}${e.memo?' · '+e.memo:''}</div>
      </div>
      <span class="expense-company ${e.company==='グローリー'?'company-glory':'company-karista'}">${e.company||'カリスタ'}</span>
      <div class="expense-amount">${e.amount||''}</div>
      <div class="expense-actions">
        <button class="icon-btn" onclick="openEditModal('${e.firebaseId}')">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn" onclick="deleteExpense('${e.firebaseId}')">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`;
  }).join('');
}

window.toggleEditMeeting = function() {
  const cat = document.getElementById('e-cat').value;
  document.getElementById('e-meeting').classList.toggle('show', cat === MEETING_CATEGORY);
};

window.openEditModal = function(firebaseId) {
  const e = expenses.find(x => x.firebaseId === firebaseId);
  if (!e) return;
  editingId = firebaseId;
  document.getElementById('e-cat').innerHTML = catOptions(CATEGORIES.includes(e.cat) ? e.cat : CATEGORIES[CATEGORIES.length-1]);
  document.getElementById('e-people').innerHTML = peopleOptions(e.people || 2);
  document.getElementById('e-date').value = e.date || '';
  document.getElementById('e-amount').value = e.amount || '';
  document.getElementById('e-store').value = e.store || '';
  document.getElementById('e-cat').value = CATEGORIES.includes(e.cat) ? e.cat : 'その他';
  document.getElementById('e-payment').value = e.payment || '現金';
  document.getElementById('e-partner').value = e.partner || '';
  document.getElementById('e-memo').value = e.memo || '';
  setEditCompany(e.company || 'カリスタ');
  toggleEditMeeting();
  document.getElementById('edit-modal').classList.add('show');
};

window.setEditCompany = function(company) {
  document.getElementById('e-company').value = company;
  document.getElementById('e-karista-btn').className = 'company-btn' + (company === 'カリスタ' ? ' active-karista' : '');
  document.getElementById('e-glory-btn').className = 'company-btn' + (company === 'グローリー' ? ' active-glory' : '');
};

window.closeEditModal = function() { document.getElementById('edit-modal').classList.remove('show'); editingId = null; };

window.saveEdit = async function() {
  if (!editingId) return;
  const cat = document.getElementById('e-cat').value;
  const isMeeting = cat === MEETING_CATEGORY;
  await update(ref(db, 'expenses/' + editingId), {
    date: document.getElementById('e-date').value,
    amount: document.getElementById('e-amount').value,
    store: document.getElementById('e-store').value,
    cat: cat,
    payment: document.getElementById('e-payment').value,
    company: document.getElementById('e-company').value,
    people: isMeeting ? document.getElementById('e-people').value : '',
    partner: isMeeting ? document.getElementById('e-partner').value : '',
    memo: document.getElementById('e-memo').value
  });
  closeEditModal();
};

window.deleteExpense = async function(firebaseId) { await remove(ref(db, 'expenses/' + firebaseId)); };
window.deleteFromModal = async function() { if (!editingId) return; await remove(ref(db, 'expenses/' + editingId)); closeEditModal(); };

function updateBadge() {
  const b = document.getElementById('badge');
  if (expenses.length) { b.textContent = expenses.length; b.style.display = 'inline'; }
  else b.style.display = 'none';
}

window.exportCSV = function() {
  if (!expenses.length) return;
  const rows = [['日付','店名','金額','カテゴリ','支払方法','会社','人数','相手','メモ']];
  expenses.forEach(e => rows.push([e.date, e.store, e.amount, e.cat, e.payment||'', e.company||'カリスタ', e.people||'', e.partner||'', e.memo]));
  const csv = rows.map(r => r.map(c => '"'+(c||'')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = '経費精算_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
};

document.getElementById('edit-modal').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
</script>
