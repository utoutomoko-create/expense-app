<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前田さんの経費精算</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.header-icon { width: 40px; height: 40px; border-radius: 10px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-icon svg { width: 20px; height: 20px; stroke: #1a73e8; fill: none; stroke-width: 2; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; color: #666; }
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; }
.tab { padding: 8px 18px; font-size: 14px; border: none; background: none; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.panel { display: none; }
.panel.active { display: block; }
.upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: background 0.15s; margin-bottom: 1rem; background: #fff; }
.upload-zone:hover { background: #f9f9f9; }
.upload-zone input { display: none; }
.upload-icon { width: 36px; height: 36px; margin: 0 auto 8px; stroke: #999; fill: none; stroke-width: 1.5; }
.upload-label { font-size: 14px; color: #666; }
.upload-label strong { color: #1a73e8; }
.upload-small { font-size: 12px; color: #aaa; margin-top: 4px; }
.preview-area { display: none; margin-bottom: 1rem; }
.preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; border: 1px solid #e0e0e0; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #1a1a1a; font-family: inherit; transition: background 0.15s; }
.btn:hover { background: #f5f5f5; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #1a1a1a; color: #fff; border-color: transparent; }
.btn-primary:hover { background: #333; }
.btn-full { width: 100%; }
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: none; }
.card.show { display: block; }
.card-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.ai-badge { font-size: 10px; background: #e8f0fe; color: #1a73e8; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select { font-size: 14px; padding: 7px 9px; border: 1px solid #e0e0e0; border-radius: 7px; background: #fafafa; color: #1a1a1a; font-family: inherit; width: 100%; }
.field input:focus, .field select:focus { outline: none; border-color: #1a73e8; background: #fff; }
.field-full { grid-column: 1 / -1; }
.loading { display: none; text-align: center; padding: 1rem; font-size: 13px; color: #666; align-items: center; justify-content: center; gap: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.success-msg { display: none; text-align: center; padding: 0.75rem; font-size: 14px; color: #1e7e34; background: #d4edda; border-radius: 8px; margin-bottom: 1rem; }
.voice-section { text-align: center; padding: 1.5rem 1rem; }
.mic-btn { width: 72px; height: 72px; border-radius: 50%; border: 2px solid #e0e0e0; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; transition: all 0.2s; }
.mic-btn svg { width: 28px; height: 28px; stroke: #1a1a1a; fill: none; stroke-width: 1.8; }
.mic-btn.recording { border-color: #dc3545; background: #fff5f5; animation: pulse 1s infinite; }
.mic-btn.recording svg { stroke: #dc3545; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(220,53,69,0.3); } 50% { box-shadow: 0 0 0 8px rgba(220,53,69,0); } }
.voice-status { font-size: 13px; color: #666; margin-bottom: 1rem; }
.voice-transcript { min-height: 60px; padding: 12px; background: #fafafa; border-radius: 8px; font-size: 14px; color: #1a1a1a; border: 1px solid #e0e0e0; text-align: left; margin-bottom: 1rem; }
.voice-hint { font-size: 12px; color: #aaa; }
.summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px; }
.stat-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.stat-value small { font-size: 13px; font-weight: 400; color: #666; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-size: 15px; font-weight: 600; }
.expense-list { display: flex; flex-direction: column; gap: 6px; }
.expense-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; }
.expense-cat { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: #888; }
.expense-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.expense-del { width: 28px; height: 28px; border: none; background: none; cursor: pointer; color: #ccc; display: flex; align-items: center; justify-content: center; border-radius: 6px; flex-shrink: 0; }
.expense-del:hover { background: #fff0f0; color: #dc3545; }
.expense-del svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.empty-state { text-align: center; padding: 2.5rem; color: #aaa; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; }
#badge { display: none; font-size: 11px; background: #e8f0fe; color: #1a73e8; padding: 1px 6px; border-radius: 99px; margin-left: 4px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M9 14l2 2 4-4M7 3H5a2 2 0 00-2 2v16a2 2 0 002 2h14a2 2 0 002-2V5a2 2 0 00-2-2h-2M9 3h6v4H9V3z"/></svg>
    </div>
    <div>
      <h1>前田さんの経費精算</h1>
      <p>レシート読取 / 音声入力 / 経費管理</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('receipt')">レシート読取</button>
    <button class="tab" onclick="switchTab('voice')">音声入力</button>
    <button class="tab" onclick="switchTab('list')">経費一覧<span id="badge"></span></button>
  </div>

  <!-- レシートタブ -->
  <div id="panel-receipt" class="panel active">
    <div class="upload-zone" onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" onchange="handleFile(event)">
      <svg class="upload-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/><circle cx="17" cy="6" r="1"/></svg>
      <p class="upload-label"><strong>クリックして選択</strong>またはドロップ</p>
      <p class="upload-small">JPG・PNG対応 ／ レシートの写真でOK</p>
    </div>
    <div class="preview-area" id="preview-area">
      <img id="preview-img" class="preview-img" src="" alt="プレビュー">
    </div>
    <div class="loading" id="loading-receipt" style="display:none;">
      <div class="spinner"></div> AIがレシートを読み取り中...
    </div>
    <div class="success-msg" id="success-receipt">✓ 経費を登録しました</div>
    <div class="card" id="result-card">
      <div class="card-title">読取結果 <span class="ai-badge">Claude AI</span></div>
      <div class="field-row">
        <div class="field"><label>日付</label><input type="date" id="f-date"></div>
        <div class="field"><label>金額</label><input type="text" id="f-amount" placeholder="¥0"></div>
      </div>
      <div class="field-row">
        <div class="field field-full"><label>店名 / 支払先</label><input type="text" id="f-store"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>カテゴリ</label>
          <select id="f-cat">
            <option>🍽️ 食費</option><option>🚃 交通費</option><option>🏨 宿泊</option>
            <option>📦 物品</option><option>🎉 接待</option><option>📄 その他</option>
          </select>
        </div>
        <div class="field"><label>メモ</label><input type="text" id="f-memo" placeholder="任意"></div>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="addExpense('receipt')">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> 経費として登録
      </button>
    </div>
  </div>

  <!-- 音声タブ -->
  <div id="panel-voice" class="panel">
    <div class="voice-section">
      <button class="mic-btn" id="mic-btn" onclick="toggleVoice()">
        <svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3M8 22h8"/></svg>
      </button>
      <p class="voice-status" id="voice-status">マイクを押して話す</p>
      <div class="voice-transcript" id="voice-transcript" style="color:#aaa;">「昨日、新橋の居酒屋で接待費3500円」のように話してください</div>
      <button class="btn btn-primary" id="voice-parse-btn" style="display:none;margin:0 auto 1rem;" onclick="parseVoice()">
        <svg viewBox="0 0 24 24"><path d="M9 14l2 2 4-4"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg> AIで解析して登録
      </button>
      <p class="voice-hint">日本語音声認識対応 ／ Chrome推奨</p>
    </div>
    <div class="loading" id="loading-voice" style="display:none;">
      <div class="spinner"></div> 解析中...
    </div>
    <div class="success-msg" id="success-voice">✓ 経費を登録しました</div>
    <div class="card" id="voice-result-card">
      <div class="card-title">音声解析結果 <span class="ai-badge">Claude AI</span></div>
      <div class="field-row">
        <div class="field"><label>日付</label><input type="date" id="vf-date"></div>
        <div class="field"><label>金額</label><input type="text" id="vf-amount"></div>
      </div>
      <div class="field-row">
        <div class="field field-full"><label>店名 / 支払先</label><input type="text" id="vf-store"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>カテゴリ</label>
          <select id="vf-cat">
            <option>🍽️ 食費</option><option>🚃 交通費</option><option>🏨 宿泊</option>
            <option>📦 物品</option><option>🎉 接待</option><option>📄 その他</option>
          </select>
        </div>
        <div class="field"><label>メモ</label><input type="text" id="vf-memo"></div>
      </div>
      <button class="btn btn-primary btn-full" style="margin-top:8px;" onclick="addExpense('voice')">
        <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> 経費として登録
      </button>
    </div>
  </div>

  <!-- 一覧タブ -->
  <div id="panel-list" class="panel">
    <div class="summary-bar">
      <div class="stat"><div class="stat-label">件数</div><div class="stat-value" id="stat-count">0<small>件</small></div></div>
      <div class="stat"><div class="stat-label">合計</div><div class="stat-value" id="stat-total">¥0</div></div>
      <div class="stat"><div class="stat-label">今月</div><div class="stat-value" id="stat-month">¥0</div></div>
    </div>
    <div class="section-header">
      <span class="section-title">経費履歴</span>
      <button class="btn" style="font-size:13px;padding:6px 12px;" onclick="exportCSV()">CSVで出力</button>
    </div>
    <div class="expense-list" id="expense-list"></div>
  </div>
</div>

<script>
const API_URL = '/api/claude';
const catColors = {
  '🍽️ 食費':'background:#fff8e6;',
  '🚃 交通費':'background:#e8f0fe;',
  '🏨 宿泊':'background:#e8f5e9;',
  '🎉 接待':'background:#fce4ec;',
  '📦 物品':'background:#f5f5f5;',
  '📄 その他':'background:#f5f5f5;'
};
let expenses = JSON.parse(localStorage.getItem('expenses') || '[]');
let recognition = null;
let isRecording = false;

function saveExpenses() { localStorage.setItem('expenses', JSON.stringify(expenses)); }

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'list') updateList();
}

async function callClaude(messages) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages })
  });
  return await res.json();
}

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('preview-area').style.display = 'block';
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('success-receipt').style.display = 'none';
    const loading = document.getElementById('loading-receipt');
    loading.style.display = 'flex';
    const today = new Date().toISOString().split('T')[0];
    const data = await callClaude([{
      role: 'user',
      content: [
        { type: 'image', source: { type: 'base64', media_type: file.type || 'image/jpeg', data: base64 } },
        { type: 'text', text: `このレシートから抽出してJSONのみで返答:\n{"date":"YYYY-MM-DD(不明なら${today})","amount":"¥数字","store":"店名","category":"食費/交通費/宿泊/物品/接待/その他","memo":"メモ"}` }
      ]
    }]);
    loading.style.display = 'none';
    try {
      const text = data.content.map(b => b.text || '').join('');
      const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
      document.getElementById('f-date').value = parsed.date || today;
      document.getElementById('f-amount').value = parsed.amount || '';
      document.getElementById('f-store').value = parsed.store || '';
      const catMap = {'食費':'🍽️ 食費','交通費':'🚃 交通費','宿泊':'🏨 宿泊','物品':'📦 物品','接待':'🎉 接待','その他':'📄 その他'};
      document.getElementById('f-cat').value = catMap[parsed.category] || '📄 その他';
      document.getElementById('f-memo').value = parsed.memo || '';
    } catch(e) {
      document.getElementById('f-date').value = today;
      document.getElementById('f-store').value = '（手動入力してください）';
    }
    document.getElementById('result-card').classList.add('show');
  };
  reader.readAsDataURL(file);
}

function addExpense(from) {
  const prefix = from === 'voice' ? 'vf' : 'f';
  expenses.unshift({
    id: Date.now(),
    date: document.getElementById(prefix + '-date').value,
    amount: document.getElementById(prefix + '-amount').value,
    store: document.getElementById(prefix + '-store').value,
    cat: document.getElementById(prefix + '-cat').value,
    memo: document.getElementById(prefix + '-memo').value
  });
  saveExpenses();
  if (from === 'receipt') {
    document.getElementById('result-card').classList.remove('show');
    document.getElementById('preview-area').style.display = 'none';
    document.getElementById('file-input').value = '';
    showSuccess('success-receipt');
  } else {
    document.getElementById('voice-result-card').classList.remove('show');
    document.getElementById('voice-transcript').textContent = '「昨日、新橋の居酒屋で接待費3500円」のように話してください';
    document.getElementById('voice-transcript').style.color = '#aaa';
    document.getElementById('voice-parse-btn').style.display = 'none';
    showSuccess('success-voice');
  }
  updateBadge();
}

function showSuccess(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

function toggleVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('このブラウザは音声認識に対応していません。Chromeをお使いください。'); return;
  }
  if (isRecording) { recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart = () => {
    isRecording = true;
    document.getElementById('mic-btn').classList.add('recording');
    document.getElementById('voice-status').textContent = '聞いています...';
    document.getElementById('voice-transcript').textContent = '';
    document.getElementById('voice-transcript').style.color = '#1a1a1a';
    document.getElementById('voice-parse-btn').style.display = 'none';
    document.getElementById('voice-result-card').classList.remove('show');
  };
  recognition.onresult = (e) => {
    document.getElementById('voice-transcript').textContent = Array.from(e.results).map(r => r[0].transcript).join('');
  };
  recognition.onend = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('voice-status').textContent = 'マイクを押して話す';
    if (document.getElementById('voice-transcript').textContent.length > 2)
      document.getElementById('voice-parse-btn').style.display = 'flex';
  };
  recognition.onerror = () => {
    isRecording = false;
    document.getElementById('mic-btn').classList.remove('recording');
    document.getElementById('voice-status').textContent = 'エラーが発生しました。もう一度お試しください。';
  };
  recognition.start();
}

async function parseVoice() {
  const text = document.getElementById('voice-transcript').textContent;
  if (!text) return;
  const loading = document.getElementById('loading-voice');
  loading.style.display = 'flex';
  document.getElementById('voice-parse-btn').style.display = 'none';
  const today = new Date().toISOString().split('T')[0];
  const data = await callClaude([{
    role: 'user',
    content: `次の音声テキストから経費情報を抽出してJSONのみで返答（今日は${today}）:\n"${text}"\n{"date":"YYYY-MM-DD","amount":"¥数字","store":"店名","category":"食費/交通費/宿泊/物品/接待/その他","memo":"メモ"}`
  }]);
  loading.style.display = 'none';
  try {
    const raw = data.content.map(b => b.text || '').join('');
    const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('vf-date').value = parsed.date || today;
    document.getElementById('vf-amount').value = parsed.amount || '';
    document.getElementById('vf-store').value = parsed.store || '';
    const catMap = {'食費':'🍽️ 食費','交通費':'🚃 交通費','宿泊':'🏨 宿泊','物品':'📦 物品','接待':'🎉 接待','その他':'📄 その他'};
    document.getElementById('vf-cat').value = catMap[parsed.category] || '📄 その他';
    document.getElementById('vf-memo').value = parsed.memo || '';
  } catch(e) { document.getElementById('vf-date').value = today; }
  document.getElementById('voice-result-card').classList.add('show');
}

function updateList() {
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  let total = 0, monthTotal = 0;
  expenses.forEach(e => {
    const n = parseInt(e.amount.replace(/[^0-9]/g,'')) || 0;
    total += n;
    if (e.date && e.date.startsWith(thisMonth)) monthTotal += n;
  });
  document.getElementById('stat-count').innerHTML = expenses.length + '<small>件</small>';
  document.getElementById('stat-total').textContent = '¥' + total.toLocaleString();
  document.getElementById('stat-month').textContent = '¥' + monthTotal.toLocaleString();
  const list = document.getElementById('expense-list');
  if (!expenses.length) {
    list.innerHTML = '<div class="empty-state">経費がまだ登録されていません</div>'; return;
  }
  list.innerHTML = expenses.map(e => `
    <div class="expense-item">
      <div class="expense-cat" style="${catColors[e.cat]||'background:#f5f5f5;'}">${e.cat.split(' ')[0]}</div>
      <div class="expense-info">
        <div class="expense-name">${e.store||'（店名なし）'}</div>
        <div class="expense-meta">${e.date||''} · ${e.cat}${e.memo?' · '+e.memo:''}</div>
      </div>
      <div class="expense-amount">${e.amount}</div>
      <button class="expense-del" onclick="deleteExpense(${e.id})">
        <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>`).join('');
}

function deleteExpense(id) {
  expenses = expenses.filter(e => e.id !== id);
  saveExpenses(); updateList(); updateBadge();
}

function updateBadge() {
  const b = document.getElementById('badge');
  if (expenses.length) { b.textContent = expenses.length; b.style.display = 'inline'; }
  else b.style.display = 'none';
}

function exportCSV() {
  if (!expenses.length) return;
  const rows = [['日付','店名','金額','カテゴリ','メモ']];
  expenses.forEach(e => rows.push([e.date, e.store, e.amount, e.cat, e.memo]));
  const csv = rows.map(r => r.map(c => '"'+c+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = '経費精算_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

const dz = document.querySelector('.upload-zone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.background = '#f0f0f0'; });
dz.addEventListener('dragleave', () => dz.style.background = '');
dz.addEventListener('drop', e => { e.preventDefault(); dz.style.background = ''; handleFile({target:{files:e.dataTransfer.files}}); });

updateBadge();
</script>
</body>
</html>
