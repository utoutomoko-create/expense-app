<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>前田さんの経費精算</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 640px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 1.5rem; }
.header-icon { width: 40px; height: 40px; border-radius: 10px; background: #e8f0fe; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header-icon svg { width: 20px; height: 20px; stroke: #1a73e8; fill: none; stroke-width: 2; }
.header h1 { font-size: 18px; font-weight: 600; }
.header p { font-size: 13px; color: #666; }
.sync-status { font-size: 11px; padding: 3px 8px; border-radius: 99px; margin-left: auto; flex-shrink: 0; }
.sync-ok { background: #d4edda; color: #1e7e34; }
.sync-err { background: #f8d7da; color: #721c24; }
.sync-loading { background: #fff3cd; color: #856404; }
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #e0e0e0; }
.tab { padding: 8px 18px; font-size: 14px; border: none; background: none; cursor: pointer; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; font-family: inherit; }
.tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; font-weight: 500; }
.panel { display: none; }
.panel.active { display: block; }
.upload-zone { border: 1.5px dashed #ccc; border-radius: 12px; padding: 2rem; text-align: center; cursor: pointer; transition: background 0.15s; margin-bottom: 1rem; background: #fff; }
.upload-zone:hover { background: #f9f9f9; }
.upload-label { font-size: 14px; color: #666; }
.upload-label strong { color: #1a73e8; }
.upload-small { font-size: 12px; color: #aaa; margin-top: 4px; }
.preview-area { display: none; margin-bottom: 1rem; }
.preview-img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; border: 1px solid #e0e0e0; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 9px 18px; border-radius: 8px; font-size: 14px; font-weight: 500; border: 1px solid #ddd; background: #fff; cursor: pointer; color: #1a1a1a; font-family: inherit; transition: background 0.15s; }
.btn:hover { background: #f5f5f5; }
.btn:active { transform: scale(0.98); }
.btn-primary { background: #1a1a1a; color: #fff; border-color: transparent; }
.btn-primary:hover { background: #333; }
.btn-danger { background: #fff; color: #dc3545; border-color: #dc3545; }
.btn-full { width: 100%; }
.btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; display: none; }
.card.show { display: block; }
.card-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.ai-badge { font-size: 10px; background: #e8f0fe; color: #1a73e8; padding: 2px 7px; border-radius: 99px; font-weight: 500; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; }
.field input, .field select { font-size: 14px; padding: 7px 9px; border: 1px solid #e0e0e0; border-radius: 7px; background: #fafafa; color: #1a1a1a; font-family: inherit; width: 100%; }
.field input:focus, .field select:focus { outline: none; border-color: #1a73e8; background: #fff; }
.field-full { grid-column: 1 / -1; }
.loading { display: none; text-align: center; padding: 1rem; font-size: 13px; color: #666; align-items: center; justify-content: center; gap: 8px; }
.spinner { width: 14px; height: 14px; border: 2px solid #e0e0e0; border-top-color: #1a1a1a; border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.success-msg { display: none; text-align: center; padding: 0.75rem; font-size: 14px; color: #1e7e34; background: #d4edda; border-radius: 8px; margin-bottom: 1rem; }
.summary-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.stat { background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; padding: 12px; }
.stat-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-value { font-size: 20px; font-weight: 600; color: #1a1a1a; }
.stat-value small { font-size: 13px; font-weight: 400; color: #666; }
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.section-title { font-size: 15px; font-weight: 600; }
.expense-list { display: flex; flex-direction: column; gap: 6px; }
.expense-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #fff; border: 1px solid #e8e8e8; border-radius: 10px; }
.expense-cat { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.expense-info { flex: 1; min-width: 0; }
.expense-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.expense-meta { font-size: 12px; color: #888; }
.expense-amount { font-size: 15px; font-weight: 600; flex-shrink: 0; }
.expense-actions { display: flex; gap: 4px; flex-shrink: 0; }
.icon-btn { width: 28px; height: 28px; border: none; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 6px; color: #ccc; }
.icon-btn:hover.edit { background: #e8f0fe; color: #1a73e8; }
.icon-btn:hover.del { background: #fff0f0; color: #dc3545; }
.icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }
.empty-state { text-align: center; padding: 2.5rem; color: #aaa; font-size: 14px; background: #fff; border-radius: 12px; border: 1px solid #e8e8e8; }
#badge { display: none; font-size: 11px; background: #e8f0fe; color: #1a73e8; padding: 1px 6px; border-radius: 99px; margin-left: 4px; }

/* 編集モーダル */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
.modal-overlay.show { display: flex; }
.modal { background: #fff; border-radius: 16px; padding: 1.25rem; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
.modal-close { border: none; background: none; cursor: pointer; font-size: 20px; color: #999; line-height: 1; }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; }
</style>
</head>
<body>

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
            <label style="font-size:11px;color:#999;text-transform:uppercase;letter-spacing:0.5px;">メモ</label>
            <button id="memo-mic-btn" onclick="toggleMemoVoice()" style="border:1px solid #e0e0e0;background:#fafafa;border-radius:6px;cursor:pointer;padding:3px 7px;display:flex;align-items:center;gap:3px;font-size:11px;color:#666;font-family:inherit;">
              <svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg>

        <div style="display:flex;align-items:center;gap:8px;">

          <button id="supplement-analyze-btn" onclick="analyzeWithVoice()" class="btn btn-primary" style="display:none;padding:7px 12px;font-size:13px;flex-shrink:0;">再解析</button>

      <button class="btn btn-primary btn-full" style="margin-top:10px;" onclick="addExpense()">

  <!-- 一覧タブ -->
  <div id="panel-list" class="panel">
    <div class="summary-bar">
      <div class="stat"><div class="stat-label">件数</div><div class="stat-value" id="stat-count">0<small>件</small></div></div>
      <div class="stat"><div class="stat-label">合計</div><div class="stat-value" id="stat-total">¥0</div></div>
      <div class="stat"><div class="stat-label">今月</div><div class="stat-value" id="stat-month">¥0</div></div>

      <button class="btn" style="font-size:13px;padding:6px 12px;" onclick="exportCSV()">CSVで出力</button>

<!-- 編集モーダル -->

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import { getDatabase, ref, push, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAFrZe9evabVku5n4CjmwjsD5UsPWzmtKY",
  authDomain: "expense-4f6ed.firebaseapp.com",
  databaseURL: "https://expense-4f6ed-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "expense-4f6ed",
  storageBucket: "expense-4f6ed.firebasestorage.app",
  messagingSenderId: "552130406535",
  appId: "1:552130406535:web:a12484d6362abc63557022"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const expensesRef = ref(db, 'expenses');

const API_URL = '/api/claude';
const catColors = {
  '🍽️ 食費':'background:#fff8e6;',
  '🚃 交通費':'background:#e8f0fe;',
  '🏨 宿泊':'background:#e8f5e9;',
  '🎉 接待':'background:#fce4ec;',
  '📦 物品':'background:#f5f5f5;',
  '📄 その他':'background:#f5f5f5;'
};

let expenses = [];
let currentImageBase64 = null;
let currentImageType = 'image/jpeg';
let editingId = null;
let supplementRecognition = null;
let isSupplementRecording = false;

// Firebase リアルタイム同期
onValue(expensesRef, (snapshot) => {
  const data = snapshot.val();
  expenses = data ? Object.entries(data).map(([id, v]) => ({...v, firebaseId: id}))
    .sort((a,b) => b.id - a.id) : [];
  updateList();
  updateBadge();
  document.getElementById('sync-status').textContent = '同期済み';
  document.getElementById('sync-status').className = 'sync-status sync-ok';
}, (error) => {
  document.getElementById('sync-status').textContent = '接続エラー';
  document.getElementById('sync-status').className = 'sync-status sync-err';
});

window.switchTab = function(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
};

async function callClaude(messages) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages })
  });
  return await res.json();
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxWidth / img.width);
      const canvas = document.createElement('canvas');
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', quality).split(',')[1]);
    };
    img.src = url;
  });
}

window.handleFile = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const isPdf = file.type === 'application/pdf';

  // フォームと補足音声をリセット
  document.getElementById('f-date').value = '';
  document.getElementById('f-amount').value = '';
  document.getElementById('f-store').value = '';
  document.getElementById('f-cat').value = '🍽️ 食費';
  document.getElementById('f-memo').value = '';
  document.getElementById('supplement-transcript').textContent = '「日付を2月1日に」「金額を4000円に」「接待費として」など指示を話してください';
  document.getElementById('supplement-transcript').style.color = '#aaa';
  document.getElementById('supplement-analyze-btn').style.display = 'none';
  currentImageBase64 = null;

  document.getElementById('preview-area').style.display = 'block';
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('success-receipt').style.display = 'none';
  const loading = document.getElementById('loading-receipt');
  loading.style.display = 'flex';

  const today = new Date().toISOString().split('T')[0];
  const prompt = `あなたは経費精算の専門家です。添付の書類を注意深く読み取り、以下のJSONのみを返答してください。説明文やマークダウンは不要です。

抽出ルール：
- date: 書類に記載された発行日・取引日・領収日を必ず読み取ること。日付の記載が全くない場合のみ"${today}"を使用すること。和暦（令和・R・平成・H）は西暦に変換すること。
- amount: 合計金額・請求金額・領収金額を読み取ること。税込金額がある場合は税込を優先すること。"¥数字"形式（カンマなし）で返すこと。
- store: 店名・会社名・屋号を正確に読み取ること。
- category: 内容から最適なものを選択（食費/交通費/宿泊/物品/接待/その他）。
- memo: 品目や用途など補足情報があれば簡潔に記載、なければ空文字。

{"date":"YYYY-MM-DD","amount":"¥数字","store":"店名または会社名","category":"食費/交通費/宿泊/物品/接待/その他","memo":"メモ"}`;

  let messageContent;
  if (isPdf) {
    const arrayBuffer = await file.arrayBuffer();
    const uint8 = new Uint8Array(arrayBuffer);
    const pdfBase64 = btoa(uint8.reduce((d, b) => d + String.fromCharCode(b), ''));
    try {
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const pdfDoc = await pdfjsLib.getDocument({ data: uint8 }).promise;
      const page = await pdfDoc.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      const canvas = document.getElementById('preview-canvas');
      canvas.width = viewport.width; canvas.height = viewport.height;
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
      canvas.style.display = 'block';
      document.getElementById('preview-img').style.display = 'none';
      document.getElementById('preview-pdf-label').style.display = 'block';
      document.getElementById('preview-pdf-label').textContent = `📄 ${file.name}（${pdfDoc.numPages}ページ）`;
    } catch(err) {
      document.getElementById('preview-pdf-label').style.display = 'block';
      document.getElementById('preview-pdf-label').textContent = `📄 ${file.name}`;
    }
    messageContent = [
      { type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: pdfBase64 } },
      { type: 'text', text: prompt }
    ];
  } else {
    const base64 = await compressImage(file, 1200, 0.7);
    document.getElementById('preview-img').src = 'data:image/jpeg;base64,' + base64;
    document.getElementById('preview-img').style.display = 'block';
    document.getElementById('preview-canvas').style.display = 'none';
    document.getElementById('preview-pdf-label').style.display = 'none';
    currentImageBase64 = base64;
    currentImageType = 'image/jpeg';
    messageContent = [
      { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
      { type: 'text', text: prompt }
    ];
  }

  const data = await callClaude([{ role: 'user', content: messageContent }]);
  loading.style.display = 'none';
  try {
    const text = data.content.map(b => b.text || '').join('');
    const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
    document.getElementById('f-date').value = parsed.date || today;
    document.getElementById('f-amount').value = parsed.amount || '';
    document.getElementById('f-store').value = parsed.store || '';
    const catMap = {'食費':'🍽️ 食費','交通費':'🚃 交通費','宿泊':'🏨 宿泊','物品':'📦 物品','接待':'🎉 接待','その他':'📄 その他'};
    document.getElementById('f-cat').value = catMap[parsed.category] || '📄 その他';
    document.getElementById('f-memo').value = parsed.memo || '';
  } catch(err) {
    document.getElementById('f-date').value = today;
    document.getElementById('f-store').value = '（手動入力してください）';
  }
  document.getElementById('result-card').classList.add('show');
};

window.addExpense = async function() {
  const exp = {
    id: Date.now(),
    date: document.getElementById('f-date').value,
    amount: document.getElementById('f-amount').value,
    store: document.getElementById('f-store').value,
    cat: document.getElementById('f-cat').value,
    memo: document.getElementById('f-memo').value
  };
  await push(expensesRef, exp);
  document.getElementById('result-card').classList.remove('show');
  document.getElementById('preview-area').style.display = 'none';
  document.getElementById('file-input').value = '';
  document.getElementById('camera-input').value = '';
  showSuccess('success-receipt');
};

function showSuccess(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2000);
}

function startSpeechRecognition(onResult, onEnd) {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('音声認識はChromeでのみ対応しています。'); return null;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'ja-JP'; rec.continuous = false; rec.interimResults = true;
  rec.onresult = (e) => onResult(Array.from(e.results).map(r => r[0].transcript).join(''));
  rec.onend = () => onEnd(); rec.onerror = () => onEnd();
  rec.start(); return rec;
}

window.toggleMemoVoice = function() {
  const btn = document.getElementById('memo-mic-btn');
  const input = document.getElementById('f-memo');
  btn.style.color = '#dc3545'; btn.textContent = '録音中...';
  startSpeechRecognition(
    (text) => { input.value = text; },
    () => { btn.style.color = '#666'; btn.innerHTML = '<svg viewBox="0 0 24 24" style="width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0014 0M12 19v3"/></svg> 音声入力'; }
  );
};

window.toggleSupplementVoice = function() {
  if (isSupplementRecording) { supplementRecognition && supplementRecognition.stop(); return; }
  const btn = document.getElementById('supplement-mic-btn');
  const transcript = document.getElementById('supplement-transcript');
  const analyzeBtn = document.getElementById('supplement-analyze-btn');
  btn.textContent = '停止'; btn.style.background = '#fff0f0'; btn.style.color = '#dc3545';
  transcript.style.color = '#1a1a1a'; isSupplementRecording = true;
  supplementRecognition = startSpeechRecognition(
    (text) => { transcript.textContent = text; },
    () => {
      isSupplementRecording = false; btn.textContent = '話す'; btn.style.background = ''; btn.style.color = '';
      if (transcript.textContent && transcript.textContent.length > 1) analyzeBtn.style.display = 'block';
    }
  );
};

window.analyzeWithVoice = async function() {
  const voiceText = document.getElementById('supplement-transcript').textContent;
  const loading = document.getElementById('loading-receipt');
  loading.style.display = 'flex';
  document.getElementById('supplement-analyze-btn').style.display = 'none';
  const today = new Date().toISOString().split('T')[0];

  const currentValues = {
    date: document.getElementById('f-date').value,
    amount: document.getElementById('f-amount').value,
    store: document.getElementById('f-store').value,
    category: document.getElementById('f-cat').value,
    memo: document.getElementById('f-memo').value
  };

  const prompt = `あなたは経費精算アシスタントです。現在の入力内容に対してユーザーの音声指示を適用し、JSONのみで返答してください。

現在の入力内容：
- 日付: ${currentValues.date || '未入力'}
- 金額: ${currentValues.amount || '未入力'}
- 店名: ${currentValues.store || '未入力'}
- カテゴリ: ${currentValues.category || '未入力'}
- メモ: ${currentValues.memo || '未入力'}

ユーザーの指示：「${voiceText}」

ルール：
- 指示された項目だけを変更し、指示のない項目は現在の値をそのまま維持すること
- 「半分」「50%」などの表現は現在の金額を計算して適用すること
- 日付は「2月1日」「昨日」「先週月曜」なども解釈して変換すること（今日は${today}）
- 金額は"¥数字"形式（カンマなし）で返すこと
- categoryは必ず 食費/交通費/宿泊/物品/接待/その他 のいずれかにすること

{"date":"YYYY-MM-DD","amount":"¥数字","store":"店名","category":"食費/交通費/宿泊/物品/接待/その他","memo":"メモ"}`;

  const data = await callClaude([{ role: 'user', content: prompt }]);
  loading.style.display = 'none';
  try {
    const parsed = JSON.parse(data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim());
    if (parsed.date) document.getElementById('f-date').value = parsed.date;
    if (parsed.amount) document.getElementById('f-amount').value = parsed.amount;
    if (parsed.store) document.getElementById('f-store').value = parsed.store;
    const catMap = {'食費':'🍽️ 食費','交通費':'🚃 交通費','宿泊':'🏨 宿泊','物品':'📦 物品','接待':'🎉 接待','その他':'📄 その他'};
    if (parsed.category) document.getElementById('f-cat').value = catMap[parsed.category] || parsed.category;
    if (parsed.memo !== undefined) document.getElementById('f-memo').value = parsed.memo;
  } catch(e) {}
  document.getElementById('supplement-transcript').textContent = '「日付を2月1日に」「金額を4000円に」「接待費として」など指示を話してください';
  document.getElementById('supplement-transcript').style.color = '#aaa';
};


function updateList() {
  const now = new Date();
  const thisMonth = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0');
  let total = 0, monthTotal = 0;
  expenses.forEach(e => {
    const n = parseInt((e.amount||'').replace(/[^0-9]/g,'')) || 0;
    total += n;
    if (e.date && e.date.startsWith(thisMonth)) monthTotal += n;
  });
  document.getElementById('stat-count').innerHTML = expenses.length + '<small>件</small>';
  document.getElementById('stat-total').textContent = '¥' + total.toLocaleString();
  document.getElementById('stat-month').textContent = '¥' + monthTotal.toLocaleString();
  const list = document.getElementById('expense-list');
  if (!expenses.length) { list.innerHTML = '<div class="empty-state">経費がまだ登録されていません</div>'; return; }
  list.innerHTML = expenses.map(e => `
    <div class="expense-item">
      <div class="expense-cat" style="${catColors[e.cat]||'background:#f5f5f5;'}">${(e.cat||'📄').split(' ')[0]}</div>
      <div class="expense-info">
        <div class="expense-name">${e.store||'（店名なし）'}</div>
        <div class="expense-meta">${e.date||''} · ${e.cat||''}${e.memo?' · '+e.memo:''}</div>
      </div>
      <div class="expense-amount">${e.amount||''}</div>
      <div class="expense-actions">
        <button class="icon-btn edit" onclick="openEditModal('${e.firebaseId}')" title="編集">
          <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
        <button class="icon-btn del" onclick="deleteExpense('${e.firebaseId}')" title="削除">
          <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14H6L5 6M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>
      </div>
    </div>`).join('');
}

window.openEditModal = function(firebaseId) {
  const e = expenses.find(x => x.firebaseId === firebaseId);
  if (!e) return;
  editingId = firebaseId;
  document.getElementById('e-date').value = e.date || '';
  document.getElementById('e-amount').value = e.amount || '';
  document.getElementById('e-store').value = e.store || '';
  document.getElementById('e-cat').value = e.cat || '📄 その他';
  document.getElementById('e-memo').value = e.memo || '';
  document.getElementById('edit-modal').classList.add('show');
};

window.closeEditModal = function() {
  document.getElementById('edit-modal').classList.remove('show');
  editingId = null;
};

window.saveEdit = async function() {
  if (!editingId) return;
  await update(ref(db, 'expenses/' + editingId), {
    date: document.getElementById('e-date').value,
    amount: document.getElementById('e-amount').value,
    store: document.getElementById('e-store').value,
    cat: document.getElementById('e-cat').value,
    memo: document.getElementById('e-memo').value
  });
  closeEditModal();
};

window.deleteExpense = async function(firebaseId) {
  await remove(ref(db, 'expenses/' + firebaseId));
};

window.deleteFromModal = async function() {
  if (!editingId) return;
  await remove(ref(db, 'expenses/' + editingId));
  closeEditModal();
};

function updateBadge() {
  const b = document.getElementById('badge');
  if (expenses.length) { b.textContent = expenses.length; b.style.display = 'inline'; }
  else b.style.display = 'none';
}

window.exportCSV = function() {
  if (!expenses.length) return;
  const rows = [['日付','店名','金額','カテゴリ','メモ']];
  expenses.forEach(e => rows.push([e.date, e.store, e.amount, e.cat, e.memo]));
  const csv = rows.map(r => r.map(c => '"'+(c||'')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download = '経費精算_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
};

document.getElementById('edit-modal').addEventListener('click', function(e) {
  if (e.target === this) closeEditModal();
});
</script>
